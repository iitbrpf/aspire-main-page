<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
   <!-- Navbar -->
<nav class="bg-white shadow-md">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center h-16">

      <!-- Logo -->
      <div class="flex items-center">
        <img src="logo.png" alt="Logo" class="h-10 w-auto">
      </div>

      <!-- Main Nav Links -->
      <div class="hidden md:flex space-x-8 font-medium text-gray-700">
        <a href="#" class="hover:text-blue-600 transition">Home</a>
        <a href="#" class="hover:text-blue-600 transition">About</a>
        <a href="#" class="hover:text-blue-600 transition">Services</a>
        <a href="#" class="hover:text-blue-600 transition">Projects</a>
        <a href="#" class="hover:text-blue-600 transition">Contact</a>
      </div>

      <!-- Hamburger -->
      <div class="flex items-center">
        <button id="menu-btn" class="focus:outline-none">
          <svg class="w-7 h-7 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>

    </div>
  </div>

  <!-- Dropdown Menu -->
  <div id="mobile-menu" class="hidden bg-gray-50 border-t">
    <div class="px-4 py-4 space-y-3 text-gray-700">

      <a href="#" class="block hover:text-blue-600">Blog</a>
      <a href="#" class="block hover:text-blue-600">Careers</a>
      <a href="#" class="block hover:text-blue-600">Partners</a>
      <a href="#" class="block hover:text-blue-600">Support</a>

    </div>
  </div>
</nav>

<!-- Script -->
<script>
const menuBtn = document.getElementById("menu-btn");
const mobileMenu = document.getElementById("mobile-menu");

menuBtn.addEventListener("click", () => {
  mobileMenu.classList.toggle("hidden");
});
</script>
  </body>
</html>
